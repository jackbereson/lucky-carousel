name: Build PROD
on:
  push:
    tags:
      - "v*"
jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Login Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v1
        id: buildx

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v2
        id: docker_build
        with:
          context: ./
          file: ./Dockerfile
          builder: ${{ steps.buildx.outputs.name }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{secrets.DOCKERHUB_APPNAME}}.prod

      - name: Verify
        run: echo ${{ steps.docker_build.outputs.digest }}

  Notify-Success:
    runs-on: ubuntu-latest
    needs: [Build]
    if: success()
    steps:
      - name: Build Success Notification
        run: |
          echo "✅ Build succeeded!"
          echo "📦 Docker Image: ${{ secrets.DOCKERHUB_USERNAME }}/${{secrets.DOCKERHUB_APPNAME}}.prod"
          echo "🔖 Commit: ${{ github.sha }}"
          echo "👤 Author: ${{ github.actor }}"
          echo "🌿 Branch: ${{ github.ref_name }}"

  Notify-Failure:
    runs-on: ubuntu-latest
    needs: [Build]
    if: failure()
    steps:
      - name: Build Failure Notification
        run: |
          echo "❌ Build failed!"
          echo "🔖 Commit: ${{ github.sha }}"
          echo "👤 Author: ${{ github.actor }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "🔗 Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
